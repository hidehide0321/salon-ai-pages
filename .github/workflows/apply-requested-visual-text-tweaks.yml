name: Apply requested visual text tweaks once

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply only requested visual and text tweaks
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          old_css = '.thanks{white-space:pre-line;line-height:1.9;background:#fff;border:1px solid #ebe7e0;border-radius:14px;padding:18px;font-size:15px}.linebtn'
          new_css = '.thanks{white-space:pre-line;line-height:1.9;background:#fff;border:1px solid #ebe7e0;border-radius:14px;padding:18px;font-size:15px}.keyword-box{display:block;background:#8de1f0;color:#1f4f5a;text-align:center;border-radius:0;padding:12px 16px;margin:14px 0;font-size:18px;font-weight:800;line-height:1.2}.linebtn'
          for name in ['index.html', 'salon_mousikomi.html']:
              path = Path(name)
              text = path.read_text(encoding='utf-8')
              text = text.replace(old_css, new_css)
              text = text.replace('合言葉：シート', '<span class="keyword-box">シート</span>')
              path.write_text(text, encoding='utf-8')

          diagnosis = Path('salon_sindan_si-to.html')
          text = diagnosis.read_text(encoding='utf-8-sig')
          old_input = 'class="row-title w-full bg-brand-cream/40 border-b border-stone-200 px-2 py-1 text-base focus:outline-none focus:border-brand-rose font-bold font-sans"'
          new_input = 'class="row-title w-full bg-white border-2 border-brand-rose/40 rounded-lg px-3 py-2 text-base text-brand-charcoal placeholder:text-brand-charcoal/55 focus:outline-none focus:border-brand-rose focus:ring-2 focus:ring-brand-rose/25 font-bold font-sans shadow-sm"'
          text = text.replace(old_input, new_input)
          text = text.replace('© サロン業務スマート化推進サポート All Rights Reserved.', '© ヒデ│お客さまに選ばれるサロンをAIでつくる人 All Rights Reserved.')
          diagnosis.write_text('\ufeff' + text.lstrip('\ufeff'), encoding='utf-8')

          workflow = Path('.github/workflows/apply-requested-visual-text-tweaks.yml')
          if workflow.exists():
              workflow.unlink()
          PY
      - name: Commit requested tweaks
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html salon_mousikomi.html salon_sindan_si-to.html .github/workflows/apply-requested-visual-text-tweaks.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Apply requested visual text tweaks"
            git push
          fi
