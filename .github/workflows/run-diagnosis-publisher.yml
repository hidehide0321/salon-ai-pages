name: Run diagnosis page publisher

on:
  push:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply prepared update
        shell: python
        run: |
          from pathlib import Path
          import textwrap
          source = Path('.github/workflows/publish-diagnosis-pdf-fix.yml').read_text(encoding='utf-8')
          start_marker = '      - name: Update diagnosis submission format\n        shell: python\n        run: |\n'
          end_marker = '      - name: Commit published page\n'
          code = source.split(start_marker, 1)[1].split(end_marker, 1)[0]
          exec(compile(textwrap.dedent(code), 'diagnosis_publisher.py', 'exec'))
      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add salon_sindan_si-to.html
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Fix diagnosis PDF answer format"
          git push
